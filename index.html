<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PELINDO T2 - INVENTORY SYSTEM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap');
        
        :root {
            --bg-deep: #0f172a;
            --bg-card: #1e293b;
            --accent: #38bdf8;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-deep);
            color: #f1f5f9;
            text-transform: uppercase;
        }

        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 1.5rem;
        }

        .status-badge-in { background: rgba(16, 185, 129, 0.1); color: #10b981; }
        .status-badge-out { background: rgba(239, 68, 68, 0.1); color: #ef4444; }
        
        .input-dark {
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            transition: all 0.3s ease;
        }
        
        .input-dark:focus {
            border-color: var(--accent);
            outline: none;
            box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.2);
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-deep); }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, deleteDoc, doc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'pelindo-t2-v2';
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.fb = { db, auth, appId, collection, addDoc, deleteDoc, doc, onSnapshot, query, orderBy, signInAnonymously, signInWithCustomToken };
    </script>
</head>
<body class="min-h-screen">

    <!-- Header -->
    <header class="border-b border-white/5 bg-slate-900/50 sticky top-0 z-50 backdrop-blur-md">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <div class="w-10 h-10 bg-sky-500 rounded-xl flex items-center justify-center font-black italic text-white shadow-lg shadow-sky-500/20">T2</div>
                <div>
                    <h1 class="text-sm font-black tracking-tighter">PELINDO INVENTORY</h1>
                    <p class="text-[10px] text-sky-400 font-bold">TERMINAL 2 MONITORING</p>
                </div>
            </div>
            <div class="flex gap-2">
                <button onclick="exportToExcel()" class="p-2 hover:bg-white/5 rounded-lg text-slate-400 transition-all">
                    <i data-lucide="download" class="w-5 h-5"></i>
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-8">
        <!-- Stats Grid -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="glass-card p-6 border-l-4 border-sky-500">
                <p class="text-[10px] font-bold text-slate-400 mb-1">ELECTRICAL TOTAL</p>
                <h2 id="total-elec" class="text-xl font-black italic text-white">RP 0</h2>
            </div>
            <div class="glass-card p-6 border-l-4 border-orange-500">
                <p class="text-[10px] font-bold text-slate-400 mb-1">MECHANICAL TOTAL</p>
                <h2 id="total-mech" class="text-xl font-black italic text-white">RP 0</h2>
            </div>
            <div class="glass-card p-6 border-l-4 border-emerald-500">
                <p class="text-[10px] font-bold text-slate-400 mb-1">PLUMBING TOTAL</p>
                <h2 id="total-plum" class="text-xl font-black italic text-white">RP 0</h2>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <!-- Form Section -->
            <div class="lg:col-span-4 space-y-6">
                <div class="glass-card p-6">
                    <h3 class="text-xs font-black mb-6 flex items-center gap-2 text-sky-400">
                        <i data-lucide="plus-circle" class="w-4 h-4"></i> INPUT DATA BARU
                    </h3>
                    <form id="itemForm" class="space-y-4">
                        <div class="space-y-1">
                            <label class="text-[9px] font-bold text-slate-500 ml-1">KATEGORI</label>
                            <select id="category" class="w-full input-dark rounded-xl p-3 text-[10px] font-bold" required>
                                <option value="ELECTRICAL">ELECTRICAL</option>
                                <option value="MECHANICAL">MECHANICAL</option>
                                <option value="PLUMBING">PLUMBING</option>
                            </select>
                        </div>
                        <div class="space-y-1">
                            <label class="text-[9px] font-bold text-slate-500 ml-1">NAMA BARANG</label>
                            <input type="text" id="name" class="w-full input-dark rounded-xl p-3 text-[10px] font-bold" placeholder="NAMA BARANG..." required>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div class="space-y-1">
                                <label class="text-[9px] font-bold text-slate-500 ml-1">QTY</label>
                                <input type="number" id="qty" class="w-full input-dark rounded-xl p-3 text-[10px] font-bold" placeholder="0" required>
                            </div>
                            <div class="space-y-1">
                                <label class="text-[9px] font-bold text-slate-500 ml-1">SATUAN</label>
                                <input type="text" id="unit" class="w-full input-dark rounded-xl p-3 text-[10px] font-bold" placeholder="PCS/SET/ROLL">
                            </div>
                        </div>
                        <div class="space-y-1">
                            <label class="text-[9px] font-bold text-slate-500 ml-1">HARGA SATUAN (RP)</label>
                            <input type="number" id="price" class="w-full input-dark rounded-xl p-3 text-[10px] font-bold" placeholder="0">
                        </div>
                        <div class="space-y-1">
                            <label class="text-[9px] font-bold text-slate-500 ml-1">STATUS TRANSAKSI</label>
                            <select id="status" class="w-full input-dark rounded-xl p-3 text-[10px] font-bold">
                                <option value="MASUK">BARANG MASUK (+)</option>
                                <option value="KELUAR">BARANG KELUAR (-)</option>
                            </select>
                        </div>
                        <button type="submit" class="w-full bg-sky-500 hover:bg-sky-400 text-white font-black text-[10px] py-4 rounded-xl transition-all shadow-lg shadow-sky-500/20 mt-4 uppercase tracking-widest">
                            Simpan Data
                        </button>
                    </form>
                </div>
            </div>

            <!-- Table Section -->
            <div class="lg:col-span-8">
                <div class="glass-card overflow-hidden">
                    <div class="p-6 border-b border-white/5 flex justify-between items-center bg-white/5">
                        <h3 class="text-xs font-black tracking-widest">LOG INVENTARIS</h3>
                        <div class="flex gap-2">
                            <div id="loading" class="hidden text-sky-400 animate-pulse text-[10px] font-bold">MEMPROSES...</div>
                        </div>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr class="text-[9px] font-black text-slate-500 uppercase tracking-tighter border-b border-white/5">
                                    <th class="p-4">TANGGAL</th>
                                    <th class="p-4">INFORMASI BARANG</th>
                                    <th class="p-4">QTY</th>
                                    <th class="p-4 text-right">TOTAL (RP)</th>
                                    <th class="p-4 text-center">AKSI</th>
                                </tr>
                            </thead>
                            <tbody id="inventory-list" class="text-[10px] font-semibold divide-y divide-white/5">
                                <!-- Data rows -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="toast" class="fixed bottom-6 right-6 translate-y-20 opacity-0 transition-all duration-500 z-[100]">
        <div class="bg-slate-800 border border-sky-500 text-white px-6 py-3 rounded-2xl shadow-2xl flex items-center gap-3">
            <div class="w-2 h-2 rounded-full bg-sky-500 animate-ping"></div>
            <span id="toast-msg" class="text-[10px] font-black tracking-widest uppercase">Pesan Berhasil</span>
        </div>
    </div>

    <script>
        let inventory = [];

        async function init() {
            lucide.createIcons();
            const { auth, db, appId, collection, onSnapshot, query, orderBy, signInAnonymously, signInWithCustomToken } = window.fb;
            
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }

                const colRef = collection(db, 'artifacts', appId, 'public', 'data', 'inventory_main');
                const q = query(colRef, orderBy("createdAt", "desc"));
                
                onSnapshot(q, (snapshot) => {
                    inventory = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    render();
                });
            } catch (err) {
                console.error("Init Error:", err);
                showToast("Gagal menyambung ke database", true);
            }
        }

        function render() {
            const list = document.getElementById('inventory-list');
            const tElec = document.getElementById('total-elec');
            const tMech = document.getElementById('total-mech');
            const tPlum = document.getElementById('total-plum');
            
            list.innerHTML = '';
            let sElec = 0, sMech = 0, sPlum = 0;

            inventory.forEach(item => {
                const total = (item.price || 0) * (item.qty || 0);
                if (item.category === 'ELECTRICAL') sElec += total;
                if (item.category === 'MECHANICAL') sMech += total;
                if (item.category === 'PLUMBING') sPlum += total;

                list.innerHTML += `
                    <tr class="hover:bg-white/5 transition-colors group">
                        <td class="p-4 text-slate-500">${item.timestamp}</td>
                        <td class="p-4">
                            <div class="font-black text-white group-hover:text-sky-400 transition-colors">${item.name}</div>
                            <div class="text-[8px] text-slate-500">${item.category}</div>
                        </td>
                        <td class="p-4">
                            <span class="px-2 py-1 rounded-md font-black ${item.status === 'MASUK' ? 'status-badge-in' : 'status-badge-out'}">
                                ${item.status === 'MASUK' ? '+' : '-'}${item.qty} ${item.unit || 'PCS'}
                            </span>
                        </td>
                        <td class="p-4 text-right font-black italic">
                            ${total.toLocaleString('id-ID')}
                        </td>
                        <td class="p-4 text-center">
                            <button onclick="deleteItem('${item.id}')" class="p-2 hover:text-red-500 transition-colors opacity-0 group-hover:opacity-100">
                                <i data-lucide="trash-2" class="w-4 h-4"></i>
                            </button>
                        </td>
                    </tr>
                `;
            });

            tElec.innerText = `RP ${sElec.toLocaleString('id-ID')}`;
            tMech.innerText = `RP ${sMech.toLocaleString('id-ID')}`;
            tPlum.innerText = `RP ${sPlum.toLocaleString('id-ID')}`;
            lucide.createIcons();
        }

        document.getElementById('itemForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const { db, appId, collection, addDoc } = window.fb;
            const loader = document.getElementById('loading');
            loader.classList.remove('hidden');

            const data = {
                category: document.getElementById('category').value,
                name: document.getElementById('name').value.toUpperCase(),
                qty: parseInt(document.getElementById('qty').value),
                unit: document.getElementById('unit').value.toUpperCase(),
                price: parseInt(document.getElementById('price').value || 0),
                status: document.getElementById('status').value,
                createdAt: Date.now(),
                timestamp: new Date().toLocaleString('id-ID', { hour12: false, dateStyle: 'short', timeStyle: 'short' })
            };

            try {
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'inventory_main'), data);
                showToast("Data Inventaris Tersimpan");
                e.target.reset();
            } catch (err) {
                showToast("Error menyimpan data", true);
            } finally {
                loader.classList.add('hidden');
            }
        });

        async function deleteItem(id) {
            const { db, appId, doc, deleteDoc: del } = window.fb;
            if (confirm("HAPUS DATA INI?")) {
                await del(doc(db, 'artifacts', appId, 'public', 'data', 'inventory_main', id));
                showToast("Data Berhasil Dihapus");
            }
        }

        function exportToExcel() {
            const data = inventory.map(i => ({
                TANGGAL: i.timestamp,
                KATEGORI: i.category,
                NAMA_BARANG: i.name,
                QTY: i.qty,
                SATUAN: i.unit,
                HARGA: i.price,
                TOTAL: i.price * i.qty,
                STATUS: i.status
            }));
            const ws = XLSX.utils.json_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Inventory");
            XLSX.writeFile(wb, "INVENTORY_PELINDO_T2.xlsx");
        }

        function showToast(msg, error = false) {
            const t = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = msg;
            t.classList.remove('translate-y-20', 'opacity-0');
            setTimeout(() => t.classList.add('translate-y-20', 'opacity-0'), 3000);
        }

        window.onload = init;
    </script>
</body>
</html>
