<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#004a99">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <title>PT PELINDO PETIKEMAS NEW MAKASSAR</title>
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="logo pelindo.jpg">
    
    <!-- Library Eksternal -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/docx@7.1.0/build/index.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
        :root { --pld-blue: #004a99; --pld-sky: #00aeef; --pld-bg: #f8fafc; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--pld-bg); 
            color: #1e293b; 
            text-transform: uppercase; 
            overflow-x: hidden; 
            font-size: 13px; /* Ukuran dasar ditingkatkan */
        }

        .glass-header { background: var(--pld-blue); box-shadow: 0 4px 20px rgba(0, 74, 153, 0.2); }
        .premium-card { @apply bg-white rounded-2xl border border-slate-100 shadow-sm transition-all; }
        
        .form-input-pld { 
            @apply w-full bg-slate-50 border border-slate-200 rounded-lg px-4 py-2.5 text-xs font-bold outline-none focus:border-[#00aeef] focus:bg-white transition-all uppercase; 
        }

        .view-section { display: none; }
        .active-view { display: block; animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .nav-btn { @apply flex items-center gap-2 px-5 py-3 text-white/60 hover:text-white transition-all rounded-xl; }
        .nav-btn.active { @apply text-white bg-white/10 font-black shadow-inner; }
        
        .mini-btn { @apply p-2 rounded-lg transition-all flex items-center justify-center; }
        
        .status-pill { @apply px-2 py-0.5 rounded-full text-[9px] font-black tracking-widest border uppercase; }

        .menu-dropdown { 
            display: none; 
            @apply absolute right-0 top-full mt-2 w-36 bg-white rounded-xl shadow-xl border border-slate-100 z-50 overflow-hidden; 
        }
        .menu-dropdown.active { display: block; animation: fadeIn 0.1s ease-out; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        .chart-box { height: 130px; width: 100%; position: relative; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body onclick="window.closeAllMenus()">

    <header class="glass-header text-white sticky top-0 z-[100] pb-2">
        <!-- Judul Instansi dan Logo -->
        <div class="max-w-7xl mx-auto px-6 pt-4 pb-3 flex items-center gap-5 text-left">
            <div class="bg-white p-1.5 rounded-xl h-12 w-12 flex-shrink-0 shadow-lg">
                <img src="logo pelindo.jpg" alt="Logo" class="h-full w-full object-contain" onerror="this.src='https://www.pelindo.co.id/logo_pelindo_single.png'">
            </div>
            <div class="text-left border-l-2 border-white/20 pl-5">
                <h1 class="text-base md:text-lg font-black tracking-tight leading-tight uppercase">PT PELINDO PETIKEMAS NEW MAKASSAR</h1>
                <p class="text-[9px] font-bold opacity-70 tracking-[0.4em] mt-1 uppercase">TEKNIK TERMINAL 2</p>
            </div>
        </div>
        
        <!-- Menu Navigasi -->
        <div class="max-w-7xl mx-auto px-6 flex gap-2 overflow-x-auto no-scrollbar">
            <button onclick="window.switchView('dashboard')" id="nav-dashboard" class="nav-btn active">
                <i data-lucide="layout-dashboard" class="w-4 h-4"></i> <span class="text-[10px] uppercase tracking-wider">DASHBOARD</span>
            </button>
            <button onclick="window.switchView('stock')" id="nav-stock" class="nav-btn">
                <i data-lucide="package" class="w-4 h-4"></i> <span class="text-[10px] uppercase tracking-wider">STOK BARANG</span>
            </button>
            <button onclick="window.switchView('loan')" id="nav-loan" class="nav-btn">
                <i data-lucide="clipboard-list" class="w-4 h-4"></i> <span class="text-[10px] uppercase tracking-wider">PINJAMAN</span>
            </button>
            <button onclick="window.switchView('budget')" id="nav-budget" class="nav-btn">
                <i data-lucide="wallet" class="w-4 h-4"></i> <span class="text-[10px] uppercase tracking-wider">ANGGARAN</span>
            </button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-6">
        <!-- Dashboard Top Bar -->
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4">
            <div class="text-left">
                <h2 id="view-title" class="text-2xl font-black text-[#1e293b] tracking-tight uppercase">INVENTARIS WORKSHOP</h2>
            </div>

            <div class="flex flex-wrap items-center gap-3">
                <!-- Pencarian -->
                <div class="relative group">
                    <i data-lucide="search" class="w-4 h-4 absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-blue-500 transition-all"></i>
                    <input type="text" id="globalSearch" onkeyup="window.handleSearch(this.value)" placeholder="CARI BARANG..." class="bg-white border border-slate-200 rounded-xl pl-10 pr-4 py-2 text-xs font-bold w-40 md:w-56 focus:ring-4 focus:ring-blue-50 transition-all uppercase outline-none shadow-sm">
                </div>
                <!-- Impor -->
                <div id="importPanel" class="bg-white border border-slate-200 rounded-xl px-4 py-2 shadow-sm flex items-center">
                    <label class="cursor-pointer flex items-center gap-2 group">
                        <input type="file" id="importExcel" accept=".xlsx, .xls" class="hidden" onchange="window.importDataMultiSheets(event)">
                        <span class="text-[10px] font-black text-slate-500 group-hover:text-blue-600 tracking-widest transition-all">IMPOR FILE</span>
                    </label>
                </div>
                <!-- Unduh -->
                <div class="bg-white border border-slate-200 rounded-xl px-4 py-2 shadow-sm flex items-center gap-4">
                    <span class="text-[10px] font-black text-slate-500 tracking-widest uppercase">UNDUH</span>
                    <div class="flex gap-2">
                        <button onclick="window.exportData('xlsx')" class="mini-btn text-emerald-600 hover:bg-emerald-50" title="EXCEL"><i data-lucide="file-spreadsheet" class="w-4 h-4"></i></button>
                        <button onclick="window.exportData('docx')" class="mini-btn text-blue-600 hover:bg-blue-50" title="WORD"><i data-lucide="file-text" class="w-4 h-4"></i></button>
                        <button onclick="window.exportData('pdf')" class="mini-btn text-red-600 hover:bg-red-50" title="PDF"><i data-lucide="printer" class="w-4 h-4"></i></button>
                    </div>
                </div>
            </div>
        </div>

        <div id="view-dashboard" class="view-section active-view">
            <!-- Diagram Section -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-5 mb-8">
                <div class="premium-card p-4 flex flex-col items-center">
                    <p class="text-[9px] font-black text-orange-600 mb-2 tracking-widest uppercase">MECHANICAL TERBARU</p>
                    <div class="chart-box"><canvas id="chart-MECHANICAL"></canvas></div>
                </div>
                <div class="premium-card p-4 flex flex-col items-center">
                    <p class="text-[9px] font-black text-sky-600 mb-2 tracking-widest uppercase">ELECTRICAL TERBARU</p>
                    <div class="chart-box"><canvas id="chart-ELECTRICAL"></canvas></div>
                </div>
                <div class="premium-card p-4 flex flex-col items-center">
                    <p class="text-[9px] font-black text-emerald-600 mb-2 tracking-widest uppercase">PLUMBING TERBARU</p>
                    <div class="chart-box"><canvas id="chart-PLUMBING"></canvas></div>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 items-start text-left">
                <!-- FORM INPUT -->
                <div class="lg:col-span-4">
                    <form id="inventoryForm" class="premium-card p-6 space-y-4 shadow-md">
                        <div class="flex items-center gap-3 mb-2">
                            <div class="bg-blue-900 text-white p-1.5 rounded-lg shadow-lg"><i data-lucide="plus" class="w-4 h-4"></i></div>
                            <span class="text-xs font-black tracking-widest uppercase">INPUT AKTIVITAS</span>
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div class="space-y-1.5"><label class="text-[10px] font-black text-slate-500 uppercase">KATEGORI</label><select id="category" class="form-input-pld"><option value="ELECTRICAL">ELEC</option><option value="MECHANICAL">MECH</option><option value="PLUMBING">PLUM</option></select></div>
                            <div class="space-y-1.5"><label class="text-[10px] font-black text-slate-500 uppercase">ALIRAN</label><select id="itemStatus" onchange="window.toggleKeluarPanels()" class="form-input-pld bg-slate-100 text-[#004a99]"><option value="MASUK">MASUK (+)</option><option value="KELUAR">KELUAR (-)</option></select></div>
                        </div>

                        <div class="space-y-1.5"><label class="text-[10px] font-black text-slate-500 uppercase">NAMA MATERIAL</label><input type="text" id="itemName" class="form-input-pld" placeholder="MASUKKAN NAMA BARANG..." required></div>
                        <div class="space-y-1.5"><label class="text-[10px] font-black text-slate-500 uppercase">TIPE / MERK</label><input type="text" id="itemType" class="form-input-pld" placeholder="CONTOH: PHILIPS 10W"></div>

                        <div class="grid grid-cols-3 gap-4">
                            <div class="space-y-1.5"><label class="text-[10px] font-black text-slate-500 uppercase">QTY</label><input type="number" id="qty" class="form-input-pld" required></div>
                            <div class="space-y-1.5">
                                <label class="text-[10px] font-black text-slate-500 uppercase">SATUAN</label>
                                <select id="unit" class="form-input-pld">
                                    <option value="PCS">PCS</option><option value="ROL">ROL</option><option value="BTG">BTG</option><option value="SET">SET</option>
                                    <option value="KLG">KLG</option><option value="PCK">PCK</option><option value="KTK">KTK</option><option value="BOX">BOX</option>
                                    <option value="JERIGEN">JERIGEN</option><option value="DUS">DUS</option><option value="MTR">MTR</option>
                                </select>
                            </div>
                            <div class="space-y-1.5"><label class="text-[10px] font-black text-slate-500 uppercase">HARGA (IDR)</label><input type="number" id="price" class="form-input-pld" placeholder="0"></div>
                        </div>

                        <div id="keluarContainer" class="hidden p-4 bg-slate-50 rounded-xl border border-dashed border-slate-300 space-y-4">
                            <select id="subStatus" onchange="window.toggleSubPanels()" class="form-input-pld border-blue-200"><option value="PEMINJAMAN">BARANG PINJAM</option><option value="INSTALASI">BARANG PROYEK</option></select>
                            
                            <div id="panelPeminjaman" class="space-y-3">
                                <input type="text" id="picBorrow" class="form-input-pld" placeholder="NAMA PEMINJAM...">
                                <div class="grid grid-cols-2 gap-3">
                                    <input type="date" id="dateBorrow" class="form-input-pld" title="Tgl Pinjam">
                                    <input type="date" id="dateReturn" class="form-input-pld" title="Estimasi Kembali">
                                </div>
                                <textarea id="notesBorrow" class="form-input-pld h-16" placeholder="CATATAN PINJAMAN (OPSIONAL)..."></textarea>
                            </div>

                            <div id="panelInstalasi" class="hidden space-y-3">
                                <input type="text" id="picInstall" class="form-input-pld" placeholder="NAMA PELAKSANA...">
                                <textarea id="notesInstall" class="form-input-pld h-16" placeholder="CATATAN / LOKASI (OPSIONAL)..."></textarea>
                            </div>
                        </div>

                        <button type="submit" class="w-full bg-[#004a99] text-white py-3.5 rounded-xl font-black text-xs tracking-widest uppercase hover:scale-[1.02] active:scale-95 transition-all shadow-xl shadow-blue-900/20">SIMPAN DATA</button>
                    </form>
                </div>

                <!-- RIWAYAT -->
                <div class="lg:col-span-8">
                    <div class="flex justify-between items-center mb-4">
                        <span class="text-xs font-black tracking-widest uppercase">AKTIVITAS TERBARU</span>
                        <div class="flex items-center gap-3">
                            <button onclick="window.clearAllData()" class="text-red-400 hover:text-red-600 transition-colors"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                            <span id="entri-count" class="bg-blue-100 text-blue-800 px-3 py-1 rounded-full text-[10px] font-black">0 ENTRI</span>
                        </div>
                    </div>
                    <div class="space-y-3 max-h-[600px] overflow-y-auto pr-2" id="log-container"></div>
                </div>
            </div>
        </div>

        <!-- VIEW STOK -->
        <div id="view-stock" class="view-section">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                <div class="space-y-4">
                    <div class="border-l-4 border-orange-500 pl-3 font-black text-slate-800 text-sm tracking-widest uppercase">MECHANICAL</div>
                    <div id="stock-list-MECHANICAL" class="grid gap-3"></div>
                </div>
                <div class="space-y-4">
                    <div class="border-l-4 border-sky-500 pl-3 font-black text-slate-800 text-sm tracking-widest uppercase">ELECTRICAL</div>
                    <div id="stock-list-ELECTRICAL" class="grid gap-3"></div>
                </div>
                <div class="space-y-4">
                    <div class="border-l-4 border-emerald-500 pl-3 font-black text-slate-800 text-sm tracking-widest uppercase">PLUMBING</div>
                    <div id="stock-list-PLUMBING" class="grid gap-3"></div>
                </div>
            </div>
        </div>

        <!-- VIEW PINJAMAN -->
        <div id="view-loan" class="view-section">
            <div class="premium-card overflow-hidden shadow-md">
                <table class="w-full text-left text-xs">
                    <thead class="bg-slate-50 font-black border-b text-slate-500">
                        <tr><th class="p-4 uppercase">WAKTU</th><th class="p-4 uppercase">BARANG</th><th class="p-4 text-center uppercase">QTY</th><th class="p-4 uppercase">PIC / CATATAN</th><th class="p-4 text-right uppercase">AKSI</th></tr>
                    </thead>
                    <tbody id="loan-table-body" class="divide-y font-semibold"></tbody>
                </table>
            </div>
        </div>

        <!-- VIEW BAJET -->
        <div id="view-budget" class="view-section">
            <div id="budget-summary-grid" class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8"></div>
            <div class="p-12 md:p-16 rounded-[2.5rem] bg-[#004a99] text-white flex flex-col md:flex-row justify-between items-center gap-6 shadow-2xl">
                <div>
                    <p class="text-[10px] font-black opacity-60 tracking-[0.5em] mb-3 uppercase">TOTAL VALUASI ASET KESELURUHAN</p>
                    <h3 id="grand-total-budget" class="text-5xl md:text-6xl font-black italic tracking-tighter">RP 0</h3>
                </div>
                <i data-lucide="badge-dollar-sign" class="w-32 h-32 opacity-10"></i>
            </div>
        </div>
    </main>

    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-8 py-3 rounded-full text-xs font-black tracking-widest uppercase opacity-0 transition-all duration-300 z-[200] shadow-2xl">BERHASIL</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, deleteDoc, doc, onSnapshot, query, orderBy, getDocs, writeBatch } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // PWA Service Worker Registration
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(err => console.log("SW Fail:", err));
            });
        }

        const firebaseConfig = JSON.parse(__firebase_config);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'pelindo-v2-prod-stable';
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let inventory = [], searchQuery = "", currentView = 'dashboard', charts = {};

        window.switchView = (v) => {
            currentView = v;
            document.querySelectorAll('.view-section').forEach(s => s.style.display = 'none');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            const target = document.getElementById(`view-${v}`);
            if (target) { target.style.display = 'block'; target.classList.add('active-view'); }
            const navBtn = document.getElementById(`nav-${v}`);
            if (navBtn) navBtn.classList.add('active');
            renderAll();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        window.handleSearch = (q) => { searchQuery = q.toUpperCase().trim(); renderAll(); };
        window.toggleKeluarPanels = () => { document.getElementById('keluarContainer').classList.toggle('hidden', document.getElementById('itemStatus').value !== 'KELUAR'); };
        window.toggleSubPanels = () => { 
            const sub = document.getElementById('subStatus').value;
            document.getElementById('panelPeminjaman').classList.toggle('hidden', sub !== 'PEMINJAMAN'); 
            document.getElementById('panelInstalasi').classList.toggle('hidden', sub !== 'INSTALASI'); 
        };
        
        window.toggleRowMenu = (e, id) => { 
            e.stopPropagation(); 
            const menus = document.querySelectorAll('.menu-dropdown');
            menus.forEach(m => { if(m.id !== `menu-${id}`) m.classList.remove('active'); }); 
            const current = document.getElementById(`menu-${id}`);
            if (current) current.classList.toggle('active'); 
        };
        
        window.closeAllMenus = () => { document.querySelectorAll('.menu-dropdown').forEach(m => m.classList.remove('active')); };
        
        window.deleteItem = async (e, id) => { 
            if (e) e.stopPropagation();
            if (confirm("Hapus data ini dari cloud?")) {
                try {
                    await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'workshop_logs', id));
                    showToast("DATA DIHAPUS");
                } catch (err) { showToast("GAGAL MENGHAPUS", "bg-red-600"); }
            }
        };
        
        window.clearAllData = async () => {
            if(confirm("BERSIHKAN SELURUH DATABASE?")) {
                const q = await getDocs(collection(db, 'artifacts', appId, 'public', 'data', 'workshop_logs'));
                const batch = writeBatch(db);
                q.docs.forEach(d => batch.delete(d.ref));
                await batch.commit();
                showToast("DATABASE BERSIH");
            }
        };

        window.importDataMultiSheets = async (event) => {
            const file = event.target.files[0]; if (!file) return;
            showToast("MENGIMPOR...");
            const reader = new FileReader();
            reader.onload = async (e) => {
                try {
                    const workbook = XLSX.read(new Uint8Array(e.target.result), { type: 'array' });
                    for (const sheetName of workbook.SheetNames) {
                        const cat = sheetName.toUpperCase().includes("ELECTRICAL") ? "ELECTRICAL" : (sheetName.toUpperCase().includes("PLUMBING") ? "PLUMBING" : "MECHANICAL");
                        const json = XLSX.utils.sheet_to_json(workbook.Sheets[sheetName], { defval: "" });
                        for (const row of json) {
                            const find = (keys) => { const k = Object.keys(row).find(x => keys.some(y => x.toUpperCase().includes(y.toUpperCase()))); return k ? row[k] : null; };
                            const name = (find(["URAIAN", "BARANG", "NAMA"]) || "").toString().trim().toUpperCase();
                            const tipe = (find(["TIPE", "TYPE"]) || "").toString().trim().toUpperCase();
                            const merk = (find(["MERK", "BRAND"]) || "").toString().trim().toUpperCase();
                            const qty = parseInt((find(["VOL", "QTY", "JUMLAH"]) || 0).toString().replace(/[^0-9]/g, '')) || 0;
                            const price = parseInt((find(["HARGA", "PRICE", "SATUAN"]) || 0).toString().replace(/[^0-9]/g, '')) || 0;
                            if (name && qty > 0) {
                                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'workshop_logs'), {
                                    category: cat, name, type: [tipe, merk].filter(Boolean).join(" - "), qty, unit: (find(["SAT", "UNIT"]) || "PCS").toString().toUpperCase(), 
                                    price, status: 'MASUK', createdAt: Date.now(), timestamp: new Date().toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' })
                                });
                            }
                        }
                    }
                    showToast("IMPOR SELESAI");
                } catch (err) { showToast("GAGAL IMPOR", "bg-red-600"); }
            };
            reader.readAsArrayBuffer(file);
        };

        window.exportData = (format) => {
            const head = ["WAKTU", "KATEGORI", "BARANG", "TIPE", "QTY", "STATUS", "PIC/PELAKSANA", "CATATAN"];
            const rows = inventory.map(i => [i.timestamp, i.category, i.name, i.type || '-', i.qty, i.status, i.picBorrow || i.picInstall || '-', i.notesBorrow || i.notesInstall || '-']);
            if(format === 'xlsx') {
                const ws = XLSX.utils.aoa_to_sheet([head, ...rows]);
                const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Data"); XLSX.writeFile(wb, "LAPORAN_INVENTARIS.xlsx");
            } else if(format === 'pdf') {
                const { jsPDF } = window.jspdf;
                const docPdf = new jsPDF('landscape'); docPdf.autoTable({ head: [head], body: rows, styles: { fontSize: 8 } }); docPdf.save("LAPORAN_INVENTARIS.pdf");
            }
        };

        function renderAll() {
            const filtered = searchQuery ? inventory.filter(i => i.name.includes(searchQuery) || (i.type && i.type.includes(searchQuery)) || i.category.includes(searchQuery)) : [...inventory];
            renderDashboard(filtered); renderStock(); renderLoan(); renderBudget(); renderCharts();
            lucide.createIcons();
        }

        function renderCharts() {
            const cats = ['MECHANICAL', 'ELECTRICAL', 'PLUMBING'];
            cats.forEach(c => {
                const canvas = document.getElementById(`chart-${c}`); if(!canvas) return;
                const recentLogs = inventory.filter(i => i.category === c).sort((a, b) => b.createdAt - a.createdAt).slice(0, 5);
                const labels = recentLogs.map(i => i.name.length > 8 ? i.name.substring(0, 7) + '..' : i.name);
                const colors = recentLogs.map(i => i.status === 'MASUK' ? '#10b981' : '#ef4444');
                if(charts[c]) charts[c].destroy();
                charts[c] = new Chart(canvas.getContext('2d'), {
                    type: 'bar',
                    data: { labels: labels, datasets: [{ data: recentLogs.map(i => i.qty), backgroundColor: colors, borderRadius: 4 }] },
                    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, grid: { display: false }, ticks: { font: { size: 8 } } }, x: { grid: { display: false }, ticks: { font: { size: 8, weight: 'bold' } } } } }
                });
            });
        }

        function renderDashboard(items) {
            const container = document.getElementById('log-container'); if(!container) return;
            container.innerHTML = ''; document.getElementById('entri-count').innerText = `${items.length} ENTRI`;
            items.slice(0, 30).forEach(item => {
                const color = item.category === 'ELECTRICAL' ? '#0ea5e9' : (item.category === 'MECHANICAL' ? '#f97316' : '#10b981');
                const div = document.createElement('div');
                const pic = item.picBorrow || item.picInstall || '';
                const note = item.notesBorrow || item.notesInstall || '';
                
                div.className = `premium-card p-4 flex justify-between items-center relative border-l-[8px] mb-3 text-left shadow-sm`;
                div.style.borderLeftColor = color;
                div.innerHTML = `
                    <div class="flex-1 min-w-0 pr-4">
                        <div class="flex items-center gap-3 mb-1">
                            <h4 class="text-xs font-black text-slate-800 truncate uppercase">${item.name}</h4>
                            <span class="status-pill ${item.status === 'MASUK' ? 'bg-emerald-50 text-emerald-600 border-emerald-100' : 'bg-red-50 text-red-600 border-red-100'}">${item.status}</span>
                        </div>
                        <div class="flex flex-wrap items-center gap-3 text-[10px] font-bold text-slate-400">
                            <span class="text-slate-900 uppercase font-black">${item.qty} ${item.unit}</span> 
                            <span class="opacity-30">|</span> <span>${item.timestamp}</span>
                            ${item.type ? `<span class="opacity-30">|</span> <span class="text-slate-500 italic">${item.type}</span>` : ''}
                            ${pic ? `<span class="opacity-30">|</span> <span class="text-blue-600 font-black">PIC: ${pic}</span>` : ''}
                        </div>
                        ${note ? `<p class="mt-1.5 text-[9px] text-slate-500 italic lowercase border-t border-slate-50 pt-1">note: ${note}</p>` : ''}
                    </div>
                    <div class="relative">
                        <button onclick="window.toggleRowMenu(event, '${item.id}')" class="p-2 text-slate-300 hover:text-slate-600"><i data-lucide="more-vertical" class="w-5 h-5"></i></button>
                        <div id="menu-${item.id}" class="menu-dropdown shadow-2xl">
                            <button onclick="window.deleteItem(event, '${item.id}')" class="w-full text-left p-3 text-[10px] font-black text-red-600 hover:bg-red-50 flex items-center gap-3 uppercase"><i data-lucide="trash-2" class="w-4 h-4"></i> HAPUS</button>
                        </div>
                    </div>`;
                container.appendChild(div);
            });
        }

        function renderStock() {
            const sum = {}; inventory.forEach(i => { if(!sum[i.name]) sum[i.name] = { n: i.name, t: i.type, c: i.category, b: 0, u: i.unit }; if(i.status === 'MASUK') sum[i.name].b += i.qty; else sum[i.name].b -= i.qty; });
            ['MECHANICAL', 'ELECTRICAL', 'PLUMBING'].forEach(c => {
                const grid = document.getElementById(`stock-list-${c}`); if(!grid) return; grid.innerHTML = '';
                Object.values(sum).filter(s => s.c === c && s.b >= 0).forEach(item => {
                    grid.innerHTML += `<div class="premium-card p-4 text-left"><h4 class="text-xs font-black text-slate-800 truncate uppercase mb-1">${item.n}</h4><div class="flex justify-between items-end"><span class="text-2xl font-black text-slate-900">${item.b}</span><span class="text-[10px] font-black text-slate-300 uppercase">${item.u}</span></div></div>`;
                });
            });
        }

        function renderLoan() {
            const body = document.getElementById('loan-table-body'); if(!body) return; body.innerHTML = '';
            inventory.filter(i => i.subStatus === 'PEMINJAMAN').forEach(l => {
                body.innerHTML += `<tr><td class="p-4 text-slate-400 font-mono">${l.timestamp}</td><td class="p-4 text-[#004a99] font-black uppercase">${l.name}</td><td class="p-4 text-center font-black">${l.qty}</td><td class="p-4 uppercase">${l.picBorrow || '-'}${l.notesBorrow ? `<br><span class="text-[9px] text-slate-400 font-normal">NOTE: ${l.notesBorrow}</span>` : ''}</td><td class="p-4 text-right"><button onclick="window.deleteItem(event, '${l.id}')" class="text-emerald-500 hover:scale-110 transition-transform"><i data-lucide="check-circle-2" class="w-5 h-5"></i></button></td></tr>`;
            });
        }

        function renderBudget() {
            const sums = { MECHANICAL: 0, ELECTRICAL: 0, PLUMBING: 0 }; 
            inventory.filter(i => i.status === 'MASUK').forEach(i => { sums[i.category] += (parseInt(i.qty) * (parseInt(i.price) || 0)); });
            const grid = document.getElementById('budget-summary-grid'); if(!grid) return; grid.innerHTML = '';
            ['MECHANICAL', 'ELECTRICAL', 'PLUMBING'].forEach(c => { grid.innerHTML += `<div class="premium-card p-6 border-l-[10px] ${c === 'MECHANICAL' ? 'border-orange-500' : (c === 'ELECTRICAL' ? 'border-sky-500' : 'border-emerald-500')}"><p class="text-[10px] font-black text-slate-400 mb-2 tracking-widest uppercase">ANGGARAN ${c}</p><h3 class="text-2xl font-black italic">RP ${sums[c].toLocaleString('id-ID')}</h3></div>`; });
            document.getElementById('grand-total-budget').innerText = `RP ${(sums.MECHANICAL + sums.ELECTRICAL + sums.PLUMBING).toLocaleString('id-ID')}`;
        }

        const init = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) await signInWithCustomToken(auth, __initial_auth_token); else await signInAnonymously(auth);
                onAuthStateChanged(auth, (user) => {
                    if (user) {
                        onSnapshot(query(collection(db, 'artifacts', appId, 'public', 'data', 'workshop_logs'), orderBy("createdAt", "desc")), (snap) => {
                            inventory = snap.docs.map(doc => ({ id: doc.id, ...doc.data() })); renderAll();
                        });
                    }
                });
            } catch (err) { console.error(err); }
        };

        document.getElementById('inventoryForm').onsubmit = async (e) => {
            e.preventDefault();
            const status = document.getElementById('itemStatus').value, sub = status === 'KELUAR' ? document.getElementById('subStatus').value : null;
            const payload = {
                category: document.getElementById('category').value, name: document.getElementById('itemName').value.toUpperCase().trim(),
                type: document.getElementById('itemType').value.toUpperCase().trim(), qty: parseInt(document.getElementById('qty').value),
                price: parseInt(document.getElementById('price').value || 0), unit: document.getElementById('unit').value, status, subStatus: sub,
                picBorrow: sub === 'PEMINJAMAN' ? document.getElementById('picBorrow').value.toUpperCase() : null,
                notesBorrow: sub === 'PEMINJAMAN' ? document.getElementById('notesBorrow').value.toUpperCase() : null,
                picInstall: sub === 'INSTALASI' ? document.getElementById('picInstall').value.toUpperCase() : null,
                notesInstall: sub === 'INSTALASI' ? document.getElementById('notesInstall').value.toUpperCase() : null,
                createdAt: Date.now(), timestamp: new Date().toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' })
            };
            await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'workshop_logs'), payload);
            e.target.reset(); window.toggleKeluarPanels(); showToast("DATA DISIMPAN");
        };

        function showToast(m) { const t = document.getElementById('toast'); if(!t) return; t.innerText = m; t.style.opacity = '1'; setTimeout(() => t.style.opacity = '0', 2500); }
        init();
    </script>
</body>
</html>
